# Environment — loads .env for the development profile
spring:
  config:
    import: optional:file:.env[.properties]

  jackson:
    serialization:
      write-dates-as-timestamps: false
    property-naming-strategy: LOWER_CAMEL_CASE

# --- Server ---
server:
  port: ${SERVER_PORT:5000}

# --- External API ---
product:
  api:
    base-url: ${PRODUCT_API_BASE_URL:http://localhost:3001}
    timeout-ms: ${PRODUCT_API_TIMEOUT_MS:3000}

# --- Logging ---
logging:
  level:
    api.com: DEBUG
